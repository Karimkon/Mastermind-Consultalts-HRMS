<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Mastermind HRMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container {
            text-align: center;
            max-width: 420px;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border: 2px solid #334155;
        }
        .icon svg { width: 40px; height: 40px; color: #64748b; }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 0.9375rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.625rem 1.5rem;
            background: #2563eb;
            color: #fff;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: #1d4ed8; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            margin-top: 1.5rem;
            padding: 0.375rem 0.75rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 9999px;
            font-size: 0.75rem;
            color: #64748b;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01M8.464 15.536a5 5 0 010-7.072M5.636 18.364a9 9 0 010-12.728"/>
            </svg>
        </div>

        <h1>You're offline</h1>
        <p>
            Mastermind HRMS requires an internet connection.
            Please check your network settings and try again.
        </p>

        <button class="btn" onclick="window.location.reload()">Try again</button>

        <div class="badge">
            <span class="dot"></span>
            No internet connection
        </div>
    </div>
</body>
</html>
